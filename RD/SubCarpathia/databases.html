<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Databases — Subcarpathia Research Division — JewishGen</title>
<meta name="description" content="Searchable index of databases maintained by the JewishGen Subcarpathia Research Division.">

<!-- 1. Bootstrap -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<!-- 2. JewishGen Global Design System -->
<link rel="stylesheet" href="/JG40-Build/jg-global.css">
<!-- 3. Page-specific styles -->
<style>
a { text-decoration: none; color: inherit; }

/* -- Dark mode overrides (page-specific) -- */
body.dark-mode .page-title-band         { background-color: #0d2a45 !important; }

body.dark-mode .filter-bar              { background-color: #1e1e1e !important; border-color: #333 !important; }
body.dark-mode .filter-label            { color: #999 !important; }
body.dark-mode .filter-chip             { background-color: #2a2a2a !important; color: #c8c8c8 !important; border-color: #444 !important; }
body.dark-mode .filter-chip:hover       { background-color: #333 !important; color: #fff !important; }
body.dark-mode .filter-chip.active      { background-color: var(--navy) !important; color: #fff !important; border-color: var(--navy) !important; }
body.dark-mode .sort-select             { background-color: #2a2a2a !important; color: #e0e0e0 !important; border-color: #444 !important; }
body.dark-mode .results-count           { color: #999 !important; }

body.dark-mode .ds-card                 { background-color: #1e1e1e !important; border-color: #333 !important; }
body.dark-mode .ds-card:hover           { background-color: #252525 !important; }
body.dark-mode .ds-card-name            { color: #e0e0e0 !important; }
body.dark-mode .ds-meta-icon            { color: #8ab0c9 !important; }
body.dark-mode .ds-meta-label           { color: #999 !important; }
body.dark-mode .ds-meta-value           { color: #c8c8c8 !important; }
body.dark-mode .chip-record             { background-color: #6e7945 !important; color: #fff !important; }
body.dark-mode .chip-region             { background-color: transparent !important; border-color: #5a7a95 !important; color: #8ab0c9 !important; }
body.dark-mode .chip-language           { background-color: #2a2a2a !important; border-color: #444 !important; color: #c8c8c8 !important; }
body.dark-mode .chevron-toggle          { color: #888 !important; border-color: #333 !important; }
body.dark-mode .ds-card[aria-expanded="true"] .chevron-toggle { color: #a8b361 !important; }
body.dark-mode .ds-expand               { background-color: #181818 !important; border-top-color: #333 !important; }
body.dark-mode .ds-description          { color: #c8c8c8 !important; }
body.dark-mode .ds-fact                 { background-color: #1e1e1e !important; border-color: #333 !important; }
body.dark-mode .ds-fact-label           { color: #a8b361 !important; }
body.dark-mode .ds-fact-value           { color: #e0e0e0 !important; }
body.dark-mode .ds-cta-attribution      { color: #888 !important; }

/* ── Page title band ── */
.page-title-band {
    background-color: var(--navy);
    padding: 44px 50px;
    text-align: center;
}
.page-title-band h1 {
    margin: 0 0 10px 0;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 2.25rem;
    font-weight: normal;
    line-height: 1.2;
    color: #ffffff;
}
.page-title-band p.hero-subtitle {
    margin: 0 auto;
    font-size: 0.9375rem;
    color: rgba(255,255,255,0.85);
    max-width: 620px;
    line-height: 1.6;
}

/* (Sidebar layout, nav card, donate card, and dark-mode overrides for those */
/*  now live in jg-global.css - see RESEARCH DIVISION SIDEBAR section) */

/* ── Section heading ── */
.section-heading {
    display: block;
    font-size: 0.9375rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--navy);
    margin-bottom: 8px;
}
.green-accent-line {
    width: 40px;
    height: 3px;
    background-color: var(--sage);
    margin-bottom: 20px;
    border-radius: 1px;
}

/* ── Filter bar ── */
.filter-bar {
    background-color: var(--white);
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 8px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.25rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.03);
}
.filter-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}
.filter-row + .filter-row {
    margin-top: 0.875rem;
    padding-top: 0.875rem;
    border-top: 1px solid rgba(0,0,0,0.06);
}
.filter-label {
    font-size: 0.75rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #666;
    flex-shrink: 0;
    margin-right: 4px;
}
.filter-chip {
    display: inline-flex;
    align-items: center;
    background-color: var(--white);
    color: var(--charcoal);
    border: 1px solid rgba(0,0,0,0.15);
    border-radius: 999px;
    padding: 5px 13px;
    font-size: 0.8125rem;
    font-weight: 500;
    cursor: pointer;
    transition: background-color 0.12s, border-color 0.12s, color 0.12s;
    font-family: inherit;
}
.filter-chip:hover {
    background-color: var(--ecru);
    border-color: var(--navy);
}
.filter-chip.active {
    background-color: var(--navy);
    color: #ffffff;
    border-color: var(--navy);
}
.filter-chip:focus-visible { outline: 2px solid var(--sage); outline-offset: 2px; }

.sort-select {
    background-color: var(--white);
    border: 1px solid rgba(0,0,0,0.15);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 0.8125rem;
    font-family: inherit;
    color: var(--charcoal);
    cursor: pointer;
}
.sort-select:focus-visible { outline: 2px solid var(--sage); outline-offset: 2px; }

.results-count {
    font-size: 0.8125rem;
    color: #666;
    margin-left: auto;
}

/* ── Dataset card ── */
.ds-card {
    background-color: var(--white);
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    margin-bottom: 0.875rem;
    overflow: hidden;
    transition: box-shadow 0.15s;
}
.ds-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.08); }
.ds-card[aria-expanded="true"] { box-shadow: 0 4px 18px rgba(0,0,0,0.10); }

.ds-summary {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 1rem;
    padding: 1.125rem 1.375rem;
    cursor: pointer;
    align-items: center;
    width: 100%;
    border: none;
    background: none;
    text-align: left;
    font-family: inherit;
}
.ds-summary:focus-visible { outline: 2px solid var(--sage); outline-offset: -2px; }
.ds-card-name {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.0625rem;
    font-weight: bold;
    color: var(--navy);
    line-height: 1.3;
    margin: 0 0 8px 0;
}
.ds-meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 1.25rem 1.5rem;
    margin-bottom: 10px;
    font-size: 0.8125rem;
}
.ds-meta-item {
    display: inline-flex;
    align-items: center;
    gap: 5px;
}
.ds-meta-icon {
    color: var(--navy);
    font-size: 0.95rem;
    line-height: 1;
}
.ds-meta-label {
    font-weight: 600;
    color: var(--charcoal);
}
.ds-meta-value {
    color: var(--charcoal);
    opacity: 0.9;
}

/* Chip row */
.ds-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}
.ds-chip {
    display: inline-block;
    font-size: 0.75rem;
    padding: 3px 11px;
    border-radius: 999px;
    font-weight: 500;
    line-height: 1.5;
}
.chip-record   { background-color: var(--sage); color: #ffffff; }
.chip-region   { background-color: transparent; border: 1px solid var(--navy); color: var(--navy); }
.chip-language { background-color: var(--cream); color: var(--charcoal); border: 1px solid rgba(0,0,0,0.12); }

/* Chevron */
.chevron-toggle {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.12);
    color: #777;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.875rem;
    flex-shrink: 0;
    transition: transform 0.2s, color 0.15s, border-color 0.15s;
    background: var(--white);
}
.ds-card[aria-expanded="true"] .chevron-toggle {
    transform: rotate(180deg);
    color: var(--sage);
    border-color: var(--sage);
}

/* Expanded panel */
.ds-expand {
    display: none;
    padding: 1.5rem 1.75rem 1.625rem;
    background-color: var(--ecru);
    border-top: 1px solid rgba(0,0,0,0.08);
}
.ds-card.is-open .ds-expand { display: block; }

.ds-expand-grid {
    display: grid;
    grid-template-columns: 1fr 220px;
    gap: 1.75rem;
    align-items: start;
}
.ds-description {
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--charcoal);
    margin: 0 0 1.25rem 0;
}
.ds-description:empty { display: none; }

.ds-facts {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.75rem;
}
.ds-fact {
    background-color: var(--white);
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 6px;
    padding: 0.625rem 0.875rem;
}
.ds-fact-label {
    display: block;
    font-size: 0.6875rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--sage);
    margin-bottom: 4px;
}
.ds-fact-value {
    font-size: 0.875rem;
    color: var(--charcoal);
    font-weight: 600;
    line-height: 1.4;
    word-break: break-word;
}

/* CTA column */
.ds-cta-col {
    display: flex;
    flex-direction: column;
    gap: 0.625rem;
}
.ds-btn {
    display: inline-block;
    text-align: center;
    padding: 11px 18px;
    border-radius: 6px;
    font-weight: bold;
    font-size: 0.8125rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: filter 0.15s, transform 0.1s;
    text-decoration: none;
}
.ds-btn-navy {
    background-color: var(--navy);
    color: #ffffff;
    border: 1px solid var(--navy);
}
.ds-btn-navy:hover {
    filter: brightness(1.1);
    color: #ffffff;
    transform: translateY(-1px);
    text-decoration: none;
}
.ds-btn-sage {
    background-color: var(--sage);
    color: #ffffff;
}
.ds-btn-sage:hover {
    filter: brightness(1.08);
    color: #ffffff;
    transform: translateY(-1px);
    text-decoration: none;
}
body.dark-mode .ds-btn-navy        { background-color: #5a7a95; border-color: #5a7a95; }
body.dark-mode .ds-btn-sage        { background-color: #a8b361; color: #1a1a1a; }
body.dark-mode .ds-btn-sage:hover  { color: #1a1a1a; }

/* Empty state */
.ds-empty {
    background-color: var(--white);
    border: 1px dashed rgba(0,0,0,0.12);
    border-radius: 8px;
    padding: 2.5rem 1.5rem;
    text-align: center;
    color: #888;
    font-size: 0.9rem;
}

/* ── Responsive ── */
@media (max-width: 800px) {
    .ds-summary      { grid-template-columns: 1fr 36px; padding: 1rem 1.125rem; }
    .ds-meta-row     { gap: 0.875rem 1rem; }
    .ds-expand       { padding: 1.25rem 1.125rem 1.375rem; }
    .ds-expand-grid  { grid-template-columns: 1fr; gap: 1.25rem; }
    .ds-facts        { grid-template-columns: 1fr 1fr; }
    .page-title-band { padding: 36px 24px; }
}
</style>
</head>

<!-- HEADER -->
<div id="site-header"></div>

<!-- TITLE BAND -->
<div class="page-title-band" role="banner">
    <h1>Subcarpathia Databases</h1>
    <p class="hero-subtitle">Records, indexes, and resources maintained by the Subcarpathia Research Division.</p>
</div>

<!-- PAGE BODY -->
<div class="rd-body-wrap">
    <div class="rd-body-inner">

        <!-- Sidebar (loaded from RD_Sidebar.html via fetch) -->
        <aside id="rd-sidebar" class="rd-sidebar"></aside>

        <!-- Main content -->
        <main>
            <span class="section-heading">Database Catalog</span>
            <div class="green-accent-line"></div>

            <!-- Filter & sort bar -->
            <div class="filter-bar" aria-label="Filter and sort datasets">
                <div class="filter-row">
                    <span class="filter-label">Record Type</span>
                    <div id="recordTypeFilters" role="group" aria-label="Filter by record type">
                        <!-- chips injected by JS -->
                    </div>
                </div>
                <div class="filter-row">
                    <span class="filter-label">Sort by</span>
                    <select id="sortSelect" class="sort-select" aria-label="Sort datasets">
                        <option value="updated-desc">Last Updated &mdash; Newest First</option>
                        <option value="updated-asc">Last Updated &mdash; Oldest First</option>

                    </select>
                    <span class="results-count" id="resultsCount" aria-live="polite"></span>
                </div>

            <!-- Card list -->
            <div id="datasetList" aria-label="Dataset list"></div>

        </main>

    </div>
</div>

<!-- FOOTER -->
<div id="site-footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/JG40-Build/jg-rd-sidebar.js"></script>
<script>
function loadComponent(id, file) {
    return fetch(file)
        .then(function(r) { if (!r.ok) throw new Error('Could not load ' + file); return r.text(); })
        .then(function(html) { document.getElementById(id).innerHTML = html; })
        .catch(function(err) { console.warn(err); });
}

Promise.all([
    loadComponent('site-header', '/JG40-Build/Header_NavBar.html'),
    loadComponent('site-footer', '/JG40-Build/Footer.html'),
    loadComponent('rd-sidebar', '/JG40-Build/RD/SubCarpathia/RD_Sidebar.html')
        .then(function() { if (window.JG && JG.setActiveSidebarLink) JG.setActiveSidebarLink(); })
]).then(function() {
    document.querySelectorAll('.jg-nav .dropbtn, .main-nav .dropbtn').forEach(function(btn) {
        btn.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                var menu = this.nextElementSibling;
                if (menu) menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
            }
            if (e.key === 'Escape') {
                var menu = this.nextElementSibling;
                if (menu) menu.style.display = 'none';
            }
        });
    });
});

/* =====================================================================
   DATABASE CATALOG: load JSON, render filterable/sortable cards
   ===================================================================== */
(function() {
    var DATA_URL    = '/JG40-Build/RD/SubCarpathia/Metadata.json';
    var SEARCH_URL  = 'https://www.jewishgen.org/databases/all/';

    /* Canonical record-type buckets (multi-select filter).
       Each bucket maps to keywords found in the freeform recordType string. */
    var RECORD_BUCKETS = [
        { id: 'vital',      label: 'Vital Records',          match: ['birth', 'marriage', 'death', 'vital'] },
        { id: 'census',     label: 'Census &amp; Family Lists', match: ['census', 'family list'] },
        { id: 'yizkor',     label: 'Yizkor Books',           match: ['yizkor'] },
        { id: 'burials',    label: 'Burials',                match: ['jowbr', 'burial'] },
        { id: 'immigration',label: 'Immigration',            match: ['immigration', 'migration', 'passport'] },
        { id: 'holocaust',  label: 'Holocaust',              match: ['holocaust'] }
    ];

    var state = {
        datasets:   [],
        activeBuckets: new Set(),
        sortKey:    'updated-desc'
    };

    /* ---- Helpers ---- */
    function bucketsFor(recordType) {
        var lower = (recordType || '').toLowerCase();
        return RECORD_BUCKETS.filter(function(b) {
            return b.match.some(function(kw) { return lower.indexOf(kw) !== -1; });
        }).map(function(b) { return b.id; });
    }

    function formatMonthYear(dateStr) {
        if (!dateStr) return '';
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        var parts = dateStr.split('-');
        if (parts.length < 2) return dateStr;
        var year  = parts[0];
        var month = parseInt(parts[1], 10) - 1;
        if (month < 0 || month > 11) return dateStr;
        return months[month] + ' ' + year;
    }

    function formatNumber(n) {
        if (typeof n !== 'number') return n;
        return n.toLocaleString('en-US');
    }

    /* Title-case a freeform record-type fragment (e.g. "vital records" -> "Vital Records",
       "Yizkor Books" stays "Yizkor Books"). */
    function titleCase(str) {
        if (!str) return '';
        return str.toLowerCase().replace(/\b([a-z])/g, function(_, c) { return c.toUpperCase(); });
    }

    function escapeHtml(str) {
        if (str === null || str === undefined) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    /* Description: substitute placeholder phrasing for "Pull from Marriages line"
       entries with a generated description that includes their record type and
       count, mirroring the Marriages entry's regional phrasing. */
    var MARRIAGES_REGIONAL_PHRASE = 'from towns in the former Hungarian counties of Bereg, M&aacute;ramaros, and Ugocsa (now in Zakarpatska Oblast, in SW Ukraine)';

    function resolveDescription(d) {
        var raw = (d.description || '').trim();
        var placeholder = /pull from marriages line/i.test(raw) ||
                          /none which is wild/i.test(raw);
        if (placeholder) {
            var typePhrase = (d.recordType || 'records').toLowerCase();
            var count = formatNumber(d.recordCount);
            return 'More than ' + count + ' ' + typePhrase + ' records, ' + MARRIAGES_REGIONAL_PHRASE + '.';
        }
        return raw;
    }

    /* Split first comma-separated value out for "primary language". */
    function primaryLanguage(lang) {
        if (!lang) return '';
        return lang.split(',')[0].trim();
    }

    /* ---- Build a dataset card ---- */
    function buildCard(d, idx) {
        var recordTypes = (d.recordType || '').split(',').map(function(s){ return s.trim(); }).filter(Boolean);
        var primary     = primaryLanguage(d.language);
        var monthYear   = formatMonthYear(d.lastUpdated);
        var description = resolveDescription(d);
        var hasInfoUrl  = !!(d.infoUrl && d.infoUrl.trim());

        /* Chips: only record-type chips on the collapsed card */
        var recordChips = recordTypes.map(function(rt) {
            return '<span class="ds-chip chip-record">' + escapeHtml(titleCase(rt)) + '</span>';
        }).join('');

        /* Fact boxes */
        var facts = [
            { label: 'Date Range',    value: d.years          || '&mdash;' },
            { label: 'Total Records', value: formatNumber(d.recordCount) || '&mdash;' },
            { label: 'Language(s)',   value: escapeHtml(d.language || '&mdash;') },
            { label: 'Original Source', value: escapeHtml(d.sources || '&mdash;') }
        ];
        var factsHtml = facts.map(function(f) {
            return '<div class="ds-fact">' +
                   '<span class="ds-fact-label">' + f.label + '</span>' +
                   '<span class="ds-fact-value">' + f.value + '</span>' +
                   '</div>';
        }).join('');

        /* CTAs */
        var ctaButtons = '';
        if (hasInfoUrl) {
            ctaButtons += '<a href="' + escapeHtml(d.infoUrl) + '" class="ds-btn ds-btn-navy" target="_blank" rel="noopener noreferrer">View Description &rarr;</a>';
        }
        ctaButtons += '<a href="' + SEARCH_URL + '" class="ds-btn ds-btn-sage" target="_blank" rel="noopener noreferrer">Search Records</a>';

        var cardId = 'ds-' + idx;
        var html = '' +
            '<article class="ds-card" id="' + cardId + '" aria-expanded="false">' +
                '<button type="button" class="ds-summary" aria-controls="' + cardId + '-panel" aria-expanded="false">' +
                    '<div>' +
                        '<h3 class="ds-card-name">' + escapeHtml(d.name) + '</h3>' +
                        '<div class="ds-meta-row">' +
                            '<span class="ds-meta-item"><span class="ds-meta-icon" aria-hidden="true">&#128197;</span> <span class="ds-meta-label">Years:</span> <span class="ds-meta-value">' + escapeHtml(d.years || '\u2014') + '</span></span>' +
                            '<span class="ds-meta-item"><span class="ds-meta-icon" aria-hidden="true">&#128202;</span> <span class="ds-meta-label">Records:</span> <span class="ds-meta-value">' + (formatNumber(d.recordCount) || '\u2014') + '</span></span>' +
                            '<span class="ds-meta-item"><span class="ds-meta-icon" aria-hidden="true">&#127760;</span> <span class="ds-meta-label">Language:</span> <span class="ds-meta-value">' + escapeHtml(d.language || '\u2014') + '</span></span>' +
                            '<span class="ds-meta-item"><span class="ds-meta-icon" aria-hidden="true">&#128338;</span> <span class="ds-meta-label">Updated:</span> <span class="ds-meta-value">' + escapeHtml(monthYear || '\u2014') + '</span></span>' +
                        '</div>' +
                        '<div class="ds-chips">' +
                            recordChips +
                        '</div>' +
                    '</div>' +
                    '<span class="chevron-toggle" aria-hidden="true">&#9662;</span>' +
                '</button>' +
                '<div class="ds-expand" id="' + cardId + '-panel" role="region">' +
                    '<div class="ds-expand-grid">' +
                        '<div>' +
                            (description ? '<p class="ds-description">' + description + '</p>' : '') +
                            '<div class="ds-facts">' + factsHtml + '</div>' +
                        '</div>' +
                        '<div class="ds-cta-col">' +
                            ctaButtons +
                        '</div>' +
                    '</div>' +
                '</div>' +
            '</article>';
        return html;
    }

    /* ---- Filtering & sorting ---- */
    function applyFilters(list) {
        if (state.activeBuckets.size === 0) return list;
        return list.filter(function(d) {
            var matched = bucketsFor(d.recordType);
            return matched.some(function(b) { return state.activeBuckets.has(b); });
        });
    }

    function applySort(list) {
        var copy = list.slice();
        switch (state.sortKey) {
            case 'updated-desc':
                copy.sort(function(a, b) { return (b.lastUpdated || '').localeCompare(a.lastUpdated || ''); });
                break;
            case 'updated-asc':
                copy.sort(function(a, b) { return (a.lastUpdated || '').localeCompare(b.lastUpdated || ''); });
                break;
            case 'name-asc':
                copy.sort(function(a, b) { return (a.name || '').localeCompare(b.name || ''); });
                break;
            case 'name-desc':
                copy.sort(function(a, b) { return (b.name || '').localeCompare(a.name || ''); });
                break;
            case 'records-desc':
                copy.sort(function(a, b) { return (b.recordCount || 0) - (a.recordCount || 0); });
                break;
        }
        return copy;
    }

    function render() {
        var list      = state.datasets;
        var filtered  = applyFilters(list);
        var sorted    = applySort(filtered);
        var container = document.getElementById('datasetList');

        if (sorted.length === 0) {
            container.innerHTML = '<div class="ds-empty">No datasets match the selected filters.</div>';
        } else {
            container.innerHTML = sorted.map(buildCard).join('');
        }
        wireCardToggles(container);

        var rc = document.getElementById('resultsCount');
        if (rc) rc.textContent = sorted.length + ' of ' + list.length + ' datasets';
    }

    function wireCardToggles(container) {
        container.querySelectorAll('.ds-summary').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var card = btn.closest('.ds-card');
                var open = card.getAttribute('aria-expanded') === 'true';
                card.setAttribute('aria-expanded', open ? 'false' : 'true');
                btn.setAttribute('aria-expanded', open ? 'false' : 'true');
                card.classList.toggle('is-open', !open);
            });
        });
    }

    /* ---- Build filter chips ---- */
    function renderFilterChips(availableBuckets) {
        var wrap = document.getElementById('recordTypeFilters');
        if (!wrap) return;
        var html = '<button type="button" class="filter-chip ' +
                   (state.activeBuckets.size === 0 ? 'active' : '') +
                   '" data-bucket="__all">All</button> ';
        RECORD_BUCKETS.forEach(function(b) {
            if (availableBuckets.indexOf(b.id) === -1) return;
            html += '<button type="button" class="filter-chip ' +
                    (state.activeBuckets.has(b.id) ? 'active' : '') +
                    '" data-bucket="' + b.id + '">' + b.label + '</button> ';
        });
        wrap.innerHTML = html;
        wrap.querySelectorAll('.filter-chip').forEach(function(chip) {
            chip.addEventListener('click', function() {
                var bucket = chip.getAttribute('data-bucket');
                if (bucket === '__all') {
                    state.activeBuckets.clear();
                } else {
                    if (state.activeBuckets.has(bucket)) state.activeBuckets.delete(bucket);
                    else state.activeBuckets.add(bucket);
                }
                renderFilterChips(availableBuckets);
                render();
            });
        });
    }

    /* ---- Boot ---- */
    fetch(DATA_URL)
        .then(function(r) {
            if (!r.ok) throw new Error('Failed to load dataset metadata: ' + r.status);
            return r.json();
        })
        .then(function(data) {
            state.datasets = Array.isArray(data) ? data : [];
            /* Determine which buckets actually have data */
            var bucketsPresent = new Set();
            state.datasets.forEach(function(d) {
                bucketsFor(d.recordType).forEach(function(b) { bucketsPresent.add(b); });
            });
            renderFilterChips(Array.from(bucketsPresent));

            /* Wire sort */
            var sortEl = document.getElementById('sortSelect');
            if (sortEl) {
                sortEl.addEventListener('change', function() {
                    state.sortKey = sortEl.value;
                    render();
                });
            }
            render();
        })
        .catch(function(err) {
            console.error(err);
            var container = document.getElementById('datasetList');
            if (container) {
                container.innerHTML = '<div class="ds-empty">Database catalog could not be loaded. Please try again later.</div>';
            }
        });
})();
</script>

</body>
</html>
