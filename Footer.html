<!-- ============================================================
     JewishGen Redesign — Footer.html
     CSS: Classes below belong in GlobalStyles.css
     ============================================================

     ── CSS BLOCK (move to GlobalStyles.css when ready) ────────

     .jg-footer {
         background-color: var(--cream);
         border-top: 4px solid #09497a;
         padding: 30px 50px 20px 50px;
         font-family: 'Gotham', 'Arial', sans-serif;
     }
     body.dark-mode .jg-footer {
         background-color: #1a1a1a;
         border-top-color: #a8b361;
     }

     .jg-footer__main {
         display: flex;
         justify-content: space-between;
         align-items: center;
         flex-wrap: wrap;
         gap: 20px;
     }

     .jg-footer__logo {
         flex: 1;
         min-width: 200px;
     }
     .jg-footer__logo a {
         display: block;
         line-height: 0;
     }
     .jg-footer__logo img {
         height: 55px;
         width: auto;
         object-fit: contain;
     }

     .jg-footer__address {
         flex: 2;
         text-align: center;
         font-size: 13px;
         line-height: 1.8;
         color: var(--charcoal);
         min-width: 280px;
     }
     .jg-footer__address a {
         color: var(--navy);
         text-decoration: underline;
         font-weight: bold;
     }
     .jg-footer__address a:hover { color: var(--sage); }
     body.dark-mode .jg-footer__address { color: #a0a0a0; }
     body.dark-mode .jg-footer__address a { color: #a8b361; }

     .jg-footer__mjh {
         flex: 1;
         display: flex;
         justify-content: flex-end;
         align-items: center;
         min-width: 200px;
     }
     .jg-footer__mjh img { height: 50px; width: auto; }

     .jg-footer__legal {
         margin-top: 20px;
         padding-top: 15px;
         border-top: 1px solid #d1caba;
         text-align: center;
         font-size: 12px;
         color: var(--charcoal);
         opacity: 0.75;
     }
     body.dark-mode .jg-footer__legal {
         border-top-color: #333;
         color: #a0a0a0;
     }
     .jg-footer__legal a {
         color: var(--charcoal);
         text-decoration: none;
         font-weight: normal;
     }
     .jg-footer__legal a:hover {
         color: var(--sage);
         text-decoration: underline;
     }
     body.dark-mode .jg-footer__legal a { color: #a0a0a0; }
     body.dark-mode .jg-footer__legal a:hover { color: #a8b361; }

     .jg-footer__legal-sep {
         margin: 0 8px;
         opacity: 0.4;
     }

     @media (max-width: 768px) {
         .jg-footer { padding: 25px 20px 15px 20px; }
         .jg-footer__main { flex-direction: column; align-items: center; text-align: center; }
         .jg-footer__logo { min-width: unset; }
         .jg-footer__logo a { display: inline-block; }
         .jg-footer__mjh { justify-content: center; min-width: unset; }
         .jg-footer__legal { font-size: 11px; }
     }

     ── END CSS BLOCK ───────────────────────────────────────── -->
