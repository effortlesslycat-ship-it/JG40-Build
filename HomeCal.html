<!-- ============================================================
     JewishGen Redesign — HomeCal.html (Project Shorashim)
     Upcoming Events section on the homepage.
     Sits inside the .jg-section wrapper in index.html.
     CSS: Classes below belong in jg-global.css

     DATA SOURCE:
     Event cards are rendered dynamically by jg-events.js.
     Fetches: MJH REST API ?event_category=genealogy&per_page=3
     Cards are injected into #jg-homecal-grid on DOMContentLoaded
     via JGEvents.initHomeCal() called in index.html.

     TO ADD/REMOVE EVENTS: update the MJH event listing directly.
     No HTML edits needed — cards auto-populate from the API.
     ============================================================

     -- CSS BLOCK (move to jg-global.css when ready) -----------

     .jg-grid-3 {
         display: grid;
         grid-template-columns: repeat(3, 1fr);
         gap: 1.875rem;
     }

     .jg-card {
         background-color: var(--cream);
         border-radius: 8px;
         padding: 1.25rem;
         position: relative;
         overflow: visible;
         font-family: 'Gotham', 'Arial', sans-serif;
         transition: transform 0.2s ease;
     }
     .jg-card:hover { transform: translateY(-4px); }
     body.dark-mode .jg-card { background-color: #1e1e1e; }

     .jg-speaker-bio {
         visibility: hidden;
         width: 240px;
         background-color: var(--charcoal);
         color: #ffffff;
         text-align: left;
         border-radius: 6px;
         padding: 0.9375rem;
         position: absolute;
         z-index: 100;
         bottom: 105%;
         left: 50%;
         margin-left: -120px;
         opacity: 0;
         transition: opacity 0.3s ease;
         font-size: 0.8125rem;
         line-height: 1.4;
         box-shadow: 0 5px 15px rgba(0,0,0,0.3);
         pointer-events: none;
     }
     .jg-speaker-bio::after {
         content: "";
         position: absolute;
         top: 100%;
         left: 50%;
         margin-left: -5px;
         border-width: 5px;
         border-style: solid;
         border-color: var(--charcoal) transparent transparent transparent;
     }
     .jg-card:hover .jg-speaker-bio {
         visibility: visible;
         opacity: 1;
     }
     body.dark-mode .jg-speaker-bio {
         background-color: #2a2a2a;
         border: 1px solid #444;
     }
     body.dark-mode .jg-speaker-bio::after {
         border-color: #2a2a2a transparent transparent transparent;
     }

     .jg-card__date {
         font-size: 0.75rem;
         font-weight: bold;
         color: var(--sage);
         text-transform: uppercase;
         letter-spacing: 0.5px;
         margin-bottom: 0.25rem;
     }

     .jg-card h3 {
         color: var(--navy);
         font-size: 1rem;
         margin: 0 0 0.5rem 0;
         font-family: 'Gotham', 'Arial', sans-serif;
     }

     .jg-card__meta {
         display: flex;
         justify-content: space-between;
         font-size: 0.75rem;
         color: #666;
         margin-top: 0.625rem;
         padding-top: 0.625rem;
         border-top: 1px solid rgba(0,0,0,0.05);
     }
     body.dark-mode .jg-card__meta { color: #a0a0a0; border-top-color: #333; }

     .jg-btn-card {
         display: inline-block;
         margin-top: 0.75rem;
         padding: 0.5rem 0.9375rem;
         background-color: var(--navy);
         color: #ffffff;
         border-radius: 4px;
         font-size: 0.8125rem;
         font-weight: bold;
         text-decoration: none;
         font-family: 'Gotham', 'Arial', sans-serif;
         transition: filter 0.2s ease;
     }
     .jg-btn-card:hover { filter: brightness(1.15); }

     .jg-events-loading {
         grid-column: 1 / -1;
         text-align: center;
         padding: 2rem 0;
         color: var(--charcoal);
         opacity: 0.6;
         font-style: italic;
     }

     @media (max-width: 768px) {
         .jg-grid-3 { grid-template-columns: 1fr; }
         .jg-speaker-bio {
             bottom: auto;
             top: 105%;
         }
         .jg-speaker-bio::after {
             top: auto;
             bottom: 100%;
             border-color: transparent transparent var(--charcoal) transparent;
         }
     }

     -- END CSS BLOCK ----------------------------------------- -->

<!-- ===================================================================
     UPCOMING EVENTS - populated by JGEvents.initHomeCal() in jg-events.js
     The loading message is replaced by live cards on fetch completion.
     On failure, an error message with fallback link is shown instead.
=================================================================== -->

<div class="jg-grid-3" id="jg-homecal-grid" aria-label="Upcoming Events" role="region">
    <p class="jg-events-loading" aria-live="polite">Loading upcoming events&hellip;</p>
</div>
